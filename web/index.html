<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advantech Vision - Immersive Monitor</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #333333;
            --advantech-blue: #004280;
            --advantech-orange: #F39800;
            --card-bg: #ffffff;
            --border-radius: 12px;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
        }
        
        /* Main Monitoring Area */
        #monitor-container {
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #live-feed {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Top Bar */
        header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 2px solid var(--advantech-blue);
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-box { background: var(--advantech-blue); color: white; padding: 4px 8px; font-weight: bold; border-radius: 4px; font-size: 0.8rem; }
        .status-badge { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: #666; }
        .dot { width: 8px; height: 8px; background: #28a745; border-radius: 50%; box-shadow: 0 0 5px #28a745; }

        /* Observation PiP (Floating Window) */
        #observation-pip {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 320px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 2px solid var(--advantech-blue);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            z-index: 200;
            overflow: hidden;
        }
        #observation-pip.hidden {
            transform: translateY(20px) scale(0.9);
            opacity: 0;
            pointer-events: none;
        }
        .pip-header {
            padding: 12px 20px;
            background: var(--advantech-blue);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }
        .pip-content { padding: 20px; }
        .obs-image-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #eee;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid #ddd;
        }
        #obs-snapshot { width: 100%; height: 100%; object-fit: cover; }
        #description {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #444;
            margin-bottom: 20px;
            min-height: 50px;
        }
        
        /* Controls */
        .controls { display: flex; gap: 10px; }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .btn-primary { background: var(--advantech-orange); color: white; }
        .btn-primary:hover { background: #d98700; }
        .btn-secondary { background: #eee; color: #555; }
        
        /* Overlay Toggles */
        .toggle-controls {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 100;
            display: flex;
            gap: 15px;
        }
        .fab {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--advantech-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: none;
            transition: transform 0.2s;
        }
        .fab:hover { transform: scale(1.1); }
        .fab.active { background: var(--advantech-orange); }

    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <div class="logo-box">ADVANTECH</div>
            <h2 style="margin: 0; font-size: 1.1rem;">Vision Edge</h2>
        </div>
        <div class="status-badge">
            <span class="dot"></span>
            LIVE: Camera_01 (640x480)
        </div>
    </header>

    <div id="monitor-container">
        <img id="live-feed" src="" alt="Live Camera Feed">
        
        <div class="toggle-controls">
            <button id="toggle-obs" class="fab active" title="Toggle Observation Panel">👁️</button>
        </div>
    </div>

    <!-- Observation PiP -->
    <div id="observation-pip">
        <div class="pip-header">
            <span style="font-size: 0.85rem; font-weight: bold;">INSIGHT PANEL</span>
            <span id="close-pip" style="cursor: pointer;">✕</span>
        </div>
        <div class="pip-content">
            <div class="obs-image-container">
                <img id="obs-snapshot" src="" alt="Latest Observation">
            </div>
            <div id="description">
                Click "Analyze" to run AI detection on the current frame.
            </div>
            <div class="controls">
                <button id="btn-analyze" class="btn btn-primary">Analyze Frame</button>
            </div>
        </div>
    </div>

    <script>
        const liveFeed = document.getElementById('live-feed');
        const obsSnapshot = document.getElementById('obs-snapshot');
        const description = document.getElementById('description');
        const btnAnalyze = document.getElementById('btn-analyze');
        const pip = document.getElementById('observation-pip');
        const toggleObs = document.getElementById('toggle-obs');
        const closePip = document.getElementById('close-pip');

        // 1. Live Stream Polling
        async function updateLiveStream() {
            try {
                const response = await fetch('/api/stream');
                const data = await response.json();
                if (data.image) {
                    liveFeed.src = `data:image/jpeg;base64,${data.image}`;
                }
            } catch (e) { console.error("Stream error", e); }
        }
        setInterval(updateLiveStream, 200); // 5 FPS

        // 2. Manual Observation
        btnAnalyze.addEventListener('click', async () => {
            btnAnalyze.disabled = true;
            btnAnalyze.textContent = "Processing...";
            description.textContent = "AI is thinking...";

            try {
                const response = await fetch('/api/analyze', { method: 'POST' });
                const data = await response.json();
                if (data.image) obsSnapshot.src = `data:image/jpeg;base64,${data.image}`;
                if (data.description) description.textContent = data.description;
            } catch (e) {
                description.textContent = "Detection error occurred.";
            } finally {
                btnAnalyze.disabled = false;
                btnAnalyze.textContent = "Analyze Frame";
            }
        });

        // 3. UI Toggles
        function togglePIP() {
            pip.classList.toggle('hidden');
            toggleObs.classList.toggle('active');
        }
        toggleObs.onclick = togglePIP;
        closePip.onclick = togglePIP;

    </script>
</body>
</html>
